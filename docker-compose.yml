version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beijingwalk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beijingwalk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beijingwalk123}
      POSTGRES_DB: ${POSTGRES_DB:-beijingwalk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beijingwalk} -d ${POSTGRES_DB:-beijingwalk}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beijingwalk_backend
    restart: unless-stopped
    environment:
      FLASK_APP: run.py
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-beijingwalk}:${POSTGRES_PASSWORD:-beijingwalk123}@postgres:5432/${POSTGRES_DB:-beijingwalk}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python init_db.py &&
        gunicorn --bind 0.0.0.0:8001 --workers 4 --threads 2 run:app
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beijingwalk_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - "3001:80"
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: beijingwalk_admin_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  postgres_data: